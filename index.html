<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maria | Frontend Developer Portfolio</title>

  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
      const currentTheme = savedTheme || (systemPrefersLight ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', currentTheme);
    })();
  </script>
</head>

<body>

  <main>
    <load src="./src/components/hero/hero.html" />
    <load src="./src/components/about/about.html" />
    <load src="./src/components/projects/projects.html" />
    <load src="./src/components/experience/experience.html" />
    <load src="./src/components/contact/contact.html" />
  </main>

  <load src="./src/components/footer/footer.html" />

  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
