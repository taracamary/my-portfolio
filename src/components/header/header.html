<header class="header">
  <div class="container header__container">
    <a href="#hero" class="header__logo" aria-label="Maria - Frontend Developer Portfolio">
      M<span class="header__logo-accent">A</span>
    </a>

    <nav class="header__nav" aria-label="Main">
      <button type="button" class="header__burger" aria-expanded="false" aria-controls="main-menu"
        aria-label="Toggle menu">
        <span class="header__burger-line" aria-hidden="true"></span>
      </button>

      <ul id="main-menu" class="header__menu">
        <li class="header__menu-item">
          <a href="#hero" class="header__link header__link--active" aria-current="page">
            <span lang="en">Home</span>
            <span lang="ru">Главная</span>
          </a>
        </li>
        <li class="header__menu-item">
          <a href="#about" class="header__link">
            <span lang="en">About</span>
            <span lang="ru">Обо мне</span>
          </a>
        </li>
        <li class="header__menu-item">
          <a href="#projects" class="header__link">
            <span lang="en">Projects</span>
            <span lang="ru">Проекты</span>
          </a>
        </li>
        <li class="header__menu-item">
          <a href="#experience" class="header__link">
            <span lang="en">Experience</span>
            <span lang="ru">Опыт</span>
          </a>
        </li>
        <li class="header__menu-item">
          <a href="#contact" class="header__link">
            <span lang="en">Contact</span>
            <span lang="ru">Контакты</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="header__actions">
      <button type="button" class="header__theme-toggle" aria-label="Toggle theme">
        <svg class="header__icon header__icon--moon" aria-hidden="true">
          <use href="sprite.svg#icon-moon"></use>
        </svg>
        <svg class="header__icon header__icon--sun" aria-hidden="true">
          <use href="sprite.svg#icon-sun"></use>
        </svg>
      </button>

      <button type="button" class="header__lang-toggle" aria-label="Switch language">
        <span lang="en">EN</span>
        <span lang="ru">RU</span>
      </button>

      <a href="#contact" class="header__cta">
        <span lang="en">Hire me</span>
        <span lang="ru">Связаться</span>
      </a>
    </div>
  </div>
</header>
